name: Passing Variable

on:
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-24.04
    env:
      VAR1: "testv1"
    outputs:
      outputVar: ${{ steps.step1.outputs.outputVar }}
    steps:
      - name: step1
        run: |
          echo "$VAR1"
          echo "outputVar=$VAR1">>"$GITHUB_OUTPUT"
          echo "ENV=$VAR1">>"$GITHUB_ENV" 
      - name: step2
        run: |
          echo "Github Variable: $ENV"
          echo "Output Variable: ${{ steps.step1.outputs.outputVar }}"
  job-2:
    runs-on: ubuntu-24.04
    needs: job-1
    steps:
      - name: step2
        run: |
          echo "Github Variable: $ENV"
          echo "Output Variable: ${{ needs.job-1.outputs.outputVar }}"
